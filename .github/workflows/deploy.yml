name: Deploy MERN App

on:
  push:
    branches:
      - main  

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v3

      - name: 🏗️ Build Frontend (Vite)
        run: |
          cd frontend
          npm install
          npm run build

      - name: 🚀 Deploy Frontend to cPanel
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: frontend/dist/
          server-dir: public_html/
           timeout: 90000
          state-name: .frontend-ftp-deploy-state.json

      - name: 🚀 Deploy Backend to cPanel
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: backend/
          server-dir: backend_app/  
          exclude: |
            **/node_modules/**
            **/.env
          state-name: .backend-ftp-deploy-state.json